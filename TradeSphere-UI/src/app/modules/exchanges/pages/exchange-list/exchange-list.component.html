<div class="container mx-auto p-6">
    <div class="flex justify-between items-center mb-6">
        <h2 class="text-2xl font-bold text-gray-800">Connected Exchanges</h2>
        <button mat-raised-button color="primary" (click)="openAddExchangeDialog()">
            <mat-icon class="mr-2">add</mat-icon> Connect Exchange
        </button>
    </div>

    <div *ngIf="isLoading" class="flex justify-center p-8">
        <mat-spinner diameter="40"></mat-spinner>
    </div>

    <div *ngIf="!isLoading && exchanges.length === 0"
        class="text-center p-8 bg-white rounded-lg shadow-sm border border-dashed border-gray-300">
        <mat-icon class="text-4xl text-gray-400 mb-2">currency_exchange</mat-icon>
        <p class="text-gray-500">No exchanges connected yet.</p>
        <button mat-button color="primary" class="mt-2" (click)="openAddExchangeDialog()">Connect your first
            exchange</button>
    </div>

    <div *ngIf="!isLoading && exchanges.length > 0" class="bg-white rounded-lg shadow overflow-hidden">
        <table mat-table [dataSource]="exchanges" class="w-full">
            <!-- Name Column -->
            <ng-container matColumnDef="name">
                <th mat-header-cell *matHeaderCellDef> Account Name </th>
                <td mat-cell *matCellDef="let element"> {{element.name}} </td>
            </ng-container>

            <!-- Exchange Name Column -->
            <ng-container matColumnDef="exchangeName">
                <th mat-header-cell *matHeaderCellDef> Exchange </th>
                <td mat-cell *matCellDef="let element"> {{element.exchangeName}} </td>
            </ng-container>

            <!-- Status Column -->
            <ng-container matColumnDef="status">
                <th mat-header-cell *matHeaderCellDef> Status </th>
                <td mat-cell *matCellDef="let element">
                    <span class="px-2 py-1 rounded text-xs"
                        [ngClass]="{'bg-green-100 text-green-800': element.status === 'Active', 'bg-red-100 text-red-800': element.status !== 'Active'}">
                        {{element.status}}
                    </span>
                </td>
            </ng-container>

            <!-- API Key Column -->
            <ng-container matColumnDef="apiKey">
                <th mat-header-cell *matHeaderCellDef> API Key </th>
                <td mat-cell *matCellDef="let element" class="font-mono text-xs text-gray-600">
                    {{element.apiKeyPreview}} </td>
            </ng-container>

            <!-- Actions Column -->
            <ng-container matColumnDef="actions">
                <th mat-header-cell *matHeaderCellDef> Actions </th>
                <td mat-cell *matCellDef="let element">
                    <button mat-icon-button color="warn" (click)="deleteExchange(element.id)">
                        <mat-icon>delete</mat-icon>
                    </button>
                </td>
            </ng-container>

            <tr mat-header-row *matHeaderRowDef="displayedColumns"></tr>
            <tr mat-row *matRowDef="let row; columns: displayedColumns;"></tr>
        </table>
    </div>
</div>
