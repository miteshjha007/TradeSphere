<div class="p-6 flex flex-col gap-6 bg-white max-w-md w-full mx-auto">
    <!-- Header -->
    <div class="flex items-start gap-4">
        <div class="p-3 bg-violet-50 text-violet-600 rounded-2xl flex items-center justify-center shadow-inner">
            <mat-icon class="text-2xl">science</mat-icon>
        </div>
        <div>
            <h2 class="text-lg font-bold text-gray-800 leading-tight">Run Backtest</h2>
            <p class="text-xs text-gray-400 mt-1">Evaluate trading strategy logic on historical candles.</p>
        </div>
    </div>

    <!-- Form -->
    <form [formGroup]="form" (ngSubmit)="onSubmit()" class="flex flex-col gap-5">
        <!-- Strategy Selection -->
        <div class="flex flex-col gap-1.5">
            <label class="text-xs font-semibold text-gray-500 uppercase tracking-wider">Strategy Template</label>
            <div class="relative flex items-center">
                <select formControlName="strategyId" class="w-full px-4 py-3 bg-gray-50 border border-gray-200 rounded-xl focus:bg-white focus:ring-2 focus:ring-blue-500/20 focus:border-blue-500 transition-all duration-200 outline-none text-sm text-gray-700 appearance-none cursor-pointer">
                    <option value="" disabled selected>Choose a strategy</option>
                    <option *ngFor="let s of strategies" [value]="s.id">{{s.name}}</option>
                </select>
                <div class="pointer-events-none absolute right-4 text-gray-400 flex items-center">
                    <mat-icon>keyboard_arrow_down</mat-icon>
                </div>
            </div>
            <div *ngIf="form.get('strategyId')?.invalid && form.get('strategyId')?.touched" class="text-xs text-red-500 font-medium">
                Strategy is required
            </div>
        </div>

        <!-- Data Source -->
        <div class="grid grid-cols-2 gap-3">
            <label class="cursor-pointer rounded-xl border p-3 transition-all"
                [ngClass]="form.get('dataSource')?.value === 'Delta' ? 'border-blue-500 bg-blue-50' : 'border-gray-200 bg-gray-50 hover:bg-white'">
                <input type="radio" class="hidden" formControlName="dataSource" value="Delta">
                <div class="text-sm font-semibold text-gray-800">Delta Data</div>
                <div class="text-xs text-gray-500">BTCUSD / ETHUSD candles</div>
            </label>
            <label class="cursor-pointer rounded-xl border p-3 transition-all"
                [ngClass]="form.get('dataSource')?.value === 'MT5' ? 'border-blue-500 bg-blue-50' : 'border-gray-200 bg-gray-50 hover:bg-white'">
                <input type="radio" class="hidden" formControlName="dataSource" value="MT5">
                <div class="text-sm font-semibold text-gray-800">MT5 Data</div>
                <div class="text-xs text-gray-500">XAUUSD / broker candles</div>
            </label>
        </div>

        <div class="flex flex-col gap-1.5" *ngIf="form.get('dataSource')?.value === 'MT5'">
            <label class="text-xs font-semibold text-gray-500 uppercase tracking-wider">MT5 Account</label>
            <div class="relative flex items-center">
                <select formControlName="mt5AccountId" class="w-full px-4 py-3 bg-gray-50 border border-gray-200 rounded-xl focus:bg-white focus:ring-2 focus:ring-blue-500/20 focus:border-blue-500 transition-all duration-200 outline-none text-sm text-gray-700 appearance-none cursor-pointer">
                    <option value="" disabled selected>Choose MT5 account</option>
                    <option *ngFor="let account of mt5Accounts" [value]="account.id">{{ account.name }} - {{ account.loginPreview }}</option>
                </select>
                <div class="pointer-events-none absolute right-4 text-gray-400 flex items-center">
                    <mat-icon>keyboard_arrow_down</mat-icon>
                </div>
            </div>
            <div *ngIf="form.get('mt5AccountId')?.invalid && form.get('mt5AccountId')?.touched" class="text-xs text-red-500 font-medium">
                MT5 account is required for MT5 backtest.
            </div>
        </div>

        <!-- Symbol & Interval -->
        <div class="grid grid-cols-2 gap-4">
            <div class="flex flex-col gap-1.5">
                <label class="text-xs font-semibold text-gray-500 uppercase tracking-wider">Symbol</label>
                <input type="text" formControlName="symbol" placeholder="e.g. BTCUSD" 
                    class="w-full px-4 py-3 bg-gray-50 border border-gray-200 rounded-xl focus:bg-white focus:ring-2 focus:ring-blue-500/20 focus:border-blue-500 transition-all duration-200 outline-none text-sm text-gray-700 placeholder-gray-400" 
                    [class.border-red-500]="form.get('symbol')?.invalid && form.get('symbol')?.touched">
                <div *ngIf="form.get('symbol')?.invalid && form.get('symbol')?.touched" class="text-xs text-red-500 font-medium">
                    Symbol is required
                </div>
            </div>

            <div class="flex flex-col gap-1.5">
                <label class="text-xs font-semibold text-gray-500 uppercase tracking-wider">Interval</label>
                <div class="relative flex items-center">
                    <select formControlName="interval" class="w-full px-4 py-3 bg-gray-50 border border-gray-200 rounded-xl focus:bg-white focus:ring-2 focus:ring-blue-500/20 focus:border-blue-500 transition-all duration-200 outline-none text-sm text-gray-700 appearance-none cursor-pointer">
                        <option value="3m">3 Minutes</option>
                        <option value="5m">5 Minutes</option>
                        <option value="15m">15 Minutes</option>
                        <option value="1h">1 Hour</option>
                        <option value="4h">4 Hours</option>
                        <option value="1d">1 Day</option>
                    </select>
                    <div class="pointer-events-none absolute right-4 text-gray-400 flex items-center">
                        <mat-icon>keyboard_arrow_down</mat-icon>
                    </div>
                </div>
            </div>
        </div>

        <!-- Start Date & End Date -->
        <div class="grid grid-cols-2 gap-4">
            <div class="flex flex-col gap-1.5">
                <label class="text-xs font-semibold text-gray-500 uppercase tracking-wider">Start Date</label>
                <input type="date" formControlName="startDate"
                    class="w-full px-4 py-3 bg-gray-50 border border-gray-200 rounded-xl focus:bg-white focus:ring-2 focus:ring-blue-500/20 focus:border-blue-500 transition-all duration-200 outline-none text-sm text-gray-700" 
                    [class.border-red-500]="form.get('startDate')?.invalid && form.get('startDate')?.touched">
                <div *ngIf="form.get('startDate')?.invalid && form.get('startDate')?.touched" class="text-xs text-red-500 font-medium">
                    Start date is required
                </div>
            </div>

            <div class="flex flex-col gap-1.5">
                <label class="text-xs font-semibold text-gray-500 uppercase tracking-wider">End Date</label>
                <input type="date" formControlName="endDate"
                    class="w-full px-4 py-3 bg-gray-50 border border-gray-200 rounded-xl focus:bg-white focus:ring-2 focus:ring-blue-500/20 focus:border-blue-500 transition-all duration-200 outline-none text-sm text-gray-700" 
                    [class.border-red-500]="form.get('endDate')?.invalid && form.get('endDate')?.touched">
                <div *ngIf="form.get('endDate')?.invalid && form.get('endDate')?.touched" class="text-xs text-red-500 font-medium">
                    End date is required
                </div>
            </div>
        </div>

        <!-- Initial Capital -->
        <div class="flex flex-col gap-1.5">
            <label class="text-xs font-semibold text-gray-500 uppercase tracking-wider">Initial Capital ($)</label>
            <input type="number" formControlName="initialCapital" placeholder="e.g. 10000" 
                class="w-full px-4 py-3 bg-gray-50 border border-gray-200 rounded-xl focus:bg-white focus:ring-2 focus:ring-blue-500/20 focus:border-blue-500 transition-all duration-200 outline-none text-sm text-gray-700 placeholder-gray-400" 
                [class.border-red-500]="form.get('initialCapital')?.invalid && form.get('initialCapital')?.touched">
            <div *ngIf="form.get('initialCapital')?.invalid && form.get('initialCapital')?.touched" class="text-xs text-red-500 font-medium">
                Initial capital is required
            </div>
        </div>

        <!-- Actions -->
        <div class="flex items-center justify-end gap-3 mt-4 pt-4 border-t border-gray-100">
            <button type="button" (click)="onCancel()" 
                class="px-5 py-2.5 rounded-xl border border-gray-200 hover:bg-gray-50 text-gray-700 font-semibold text-sm transition-all duration-200 outline-none">
                Cancel
            </button>
            <button type="submit" [disabled]="form.invalid || isLoading" 
                class="px-6 py-2.5 rounded-xl bg-blue-600 hover:bg-blue-700 disabled:bg-gray-200 disabled:text-gray-400 disabled:cursor-not-allowed text-white font-semibold text-sm transition-all duration-200 outline-none shadow-sm hover:shadow flex items-center justify-center">
                <mat-spinner diameter="18" *ngIf="isLoading" class="mr-2"></mat-spinner>
                Run Simulation
            </button>
        </div>
    </form>
</div>
