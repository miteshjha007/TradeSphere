<div class="container mx-auto p-6">
    <div class="flex justify-between items-center mb-6">
        <h2 class="text-2xl font-bold text-gray-800">My Strategies</h2>
        <button mat-raised-button color="primary" routerLink="create">
            <mat-icon class="mr-2">add</mat-icon> Deploy New Strategy
        </button>
    </div>

    <div *ngIf="isLoading" class="flex justify-center p-8">
        <mat-spinner diameter="40"></mat-spinner>
    </div>

    <div *ngIf="!isLoading && activeStrategies.length === 0"
        class="text-center p-8 bg-white rounded-lg shadow-sm border border-dashed border-gray-300">
        <mat-icon class="text-4xl text-gray-400 mb-2">psychology</mat-icon>
        <p class="text-gray-500">No active strategies running.</p>
        <button mat-button color="primary" class="mt-2" routerLink="create">Deploy your first strategy</button>
    </div>

    <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6" *ngIf="!isLoading">
        <mat-card *ngFor="let s of activeStrategies" class="strategy-card">
            <mat-card-header>
                <div mat-card-avatar class="bg-blue-100 text-blue-600 rounded-full flex items-center justify-center">
                    <mat-icon>trending_up</mat-icon>
                </div>
                <mat-card-title>{{ s.strategyName }}</mat-card-title>
                <mat-card-subtitle>{{ s.exchangeName }} - {{ s.symbol }}</mat-card-subtitle>
            </mat-card-header>
            <mat-card-content class="pt-4">
                <div class="flex justify-between items-center mb-2">
                    <span class="text-sm text-gray-500">Status</span>
                    <span class="px-2 py-1 rounded text-xs font-semibold"
                        [ngClass]="{'bg-green-100 text-green-800': s.status === 'Running', 'bg-gray-100 text-gray-800': s.status === 'Stopped'}">
                        {{ s.status }}
                    </span>
                </div>
                <!-- Add more stats here like PnL -->
            </mat-card-content>
            <mat-card-actions align="end">
                <button mat-button color="primary" (click)="toggleStatus(s)">
                    {{ s.status === 'Running' ? 'Stop' : 'Start' }}
                </button>
                <button mat-icon-button color="warn" (click)="deleteStrategy(s.id)">
                    <mat-icon>delete</mat-icon>
                </button>
            </mat-card-actions>
        </mat-card>
    </div>
</div>
