<div class="flex flex-col h-full">
    <div class="h-16 flex items-center justify-center border-b">
        <span class="text-2xl font-bold text-primary">TS</span>
        <span class="ml-2 text-xl font-semibold text-gray-800">TradeSphere</span>
    </div>
    <nav class="flex-1 px-2 py-4 space-y-2">
        <a routerLink="/dashboard" routerLinkActive="bg-blue-50 text-blue-600"
            class="flex items-center px-4 py-3 text-gray-600 rounded-lg hover:bg-gray-50 transition-colors">
            <mat-icon class="mr-3">dashboard</mat-icon>
            <span class="font-medium">Dashboard</span>
        </a>
        <a routerLink="/exchanges" routerLinkActive="bg-blue-50 text-blue-600"
            class="flex items-center px-4 py-3 text-gray-600 rounded-lg hover:bg-gray-50 transition-colors">
            <mat-icon class="mr-3">currency_exchange</mat-icon>
            <span class="font-medium">Exchanges</span>
        </a>
        <a routerLink="/strategies" routerLinkActive="bg-blue-50 text-blue-600"
            class="flex items-center px-4 py-3 text-gray-600 rounded-lg hover:bg-gray-50 transition-colors">
            <mat-icon class="mr-3">psychology</mat-icon>
            <span class="font-medium">Strategies</span>
        </a>
        <a routerLink="/backtesting" routerLinkActive="bg-blue-50 text-blue-600"
            class="flex items-center px-4 py-3 text-gray-600 rounded-lg hover:bg-gray-50 transition-colors">
            <mat-icon class="mr-3">history</mat-icon>
            <span class="font-medium">Backtesting</span>
        </a>
        <a routerLink="/reports" routerLinkActive="bg-blue-50 text-blue-600"
            class="flex items-center px-4 py-3 text-gray-600 rounded-lg hover:bg-gray-50 transition-colors">
            <mat-icon class="mr-3">bar_chart</mat-icon>
            <span class="font-medium">Reports</span>
        </a>
        <a routerLink="/prop-firms" routerLinkActive="bg-blue-50 text-blue-600"
            class="flex items-center px-4 py-3 text-gray-600 rounded-lg hover:bg-gray-50 transition-colors">
            <mat-icon class="mr-3">workspace_premium</mat-icon>
            <span class="font-medium">Prop Firms</span>
        </a>
        <a routerLink="/mt5" routerLinkActive="bg-blue-50 text-blue-600"
            class="flex items-center px-4 py-3 text-gray-600 rounded-lg hover:bg-gray-50 transition-colors">
            <mat-icon class="mr-3">monitoring</mat-icon>
            <span class="font-medium">MT5</span>
        </a>
    </nav>
    <div class="p-4 border-t">
        <button (click)="logout()"
            class="flex items-center px-4 py-3 text-red-600 rounded-lg w-full hover:bg-red-50 transition-colors">
            <mat-icon class="mr-3">logout</mat-icon>
            <span class="font-medium">Logout</span>
        </button>
    </div>
</div>
